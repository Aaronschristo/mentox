<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayArea Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
    <!-- Prevent FOUC inside HTML -->
    <script>
        if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script src="js/config.js"></script>
    <script src="js/app.js" defer></script>
    <style>
        body {
            background-color: var(--secondary-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .hero-title {
            font-size: 54px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 60px;
            background: linear-gradient(135deg, var(--primary-color), #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .home-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            box-shadow: var(--box-shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .home-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(168, 85, 247, 0.05));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .home-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.1), 0 15px 15px -5px rgba(0, 0, 0, 0.04);
            border-color: var(--primary-color);
            background: var(--white);
        }

        [data-theme="dark"] .home-card:hover {
            background: rgba(30, 41, 59, 1);
        }
        
        .home-card:hover::before {
            opacity: 1;
        }

        .icon-container {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(99, 102, 241, 0.1);
        }

        .home-card i {
            font-size: 54px;
            transition: all 0.4s ease;
            color: var(--primary-color);
        }

        .home-card span {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-dark);
            letter-spacing: 0.5px;
            transition: color 0.4s ease;
        }

        .home-card:hover .icon-container {
            transform: scale(1.15) translateY(-5px);
        }

        .home-card:hover i {
            color: #ffffff;
            transform: scale(1.1);
        }

        .card-dashboard .icon-container { background: rgba(236, 72, 153, 0.1); }
        .card-dashboard i { color: #ec4899; }
        .card-dashboard:hover .icon-container { background: linear-gradient(135deg, #ec4899, #f472b6); box-shadow: 0 15px 25px rgba(236, 72, 153, 0.3); }

        .card-customers .icon-container { background: rgba(59, 130, 246, 0.1); }
        .card-customers i { color: #3b82f6; }
        .card-customers:hover .icon-container { background: linear-gradient(135deg, #3b82f6, #60a5fa); box-shadow: 0 15px 25px rgba(59, 130, 246, 0.3); }

        .card-recharge .icon-container { background: rgba(16, 185, 129, 0.1); }
        .card-recharge i { color: #10b981; }
        .card-recharge:hover .icon-container { background: linear-gradient(135deg, #10b981, #34d399); box-shadow: 0 15px 25px rgba(16, 185, 129, 0.3); }

        .card-scan .icon-container { background: rgba(245, 158, 11, 0.1); }
        .card-scan i { color: #f59e0b; }
        .card-scan:hover .icon-container { background: linear-gradient(135deg, #f59e0b, #fbbf24); box-shadow: 0 15px 25px rgba(245, 158, 11, 0.3); }

        .card-analytics .icon-container { background: rgba(139, 92, 246, 0.1); }
        .card-analytics i { color: #8b5cf6; }
        .card-analytics:hover .icon-container { background: linear-gradient(135deg, #8b5cf6, #a78bfa); box-shadow: 0 15px 25px rgba(139, 92, 246, 0.3); }

        .card-settings .icon-container { background: rgba(100, 116, 139, 0.1); }
        .card-settings i { color: #64748b; }
        .card-settings:hover .icon-container { background: linear-gradient(135deg, #64748b, #94a3b8); box-shadow: 0 15px 25px rgba(100, 116, 139, 0.3); }

        .theme-toggle-fab {
            position: fixed; 
            top: 30px; 
            right: 30px; 
            z-index: 1000; 
            background: var(--glass-bg); 
            backdrop-filter: blur(10px); 
            width: 50px;
            height: 50px;
            border-radius: 50%; 
            box-shadow: var(--box-shadow); 
            border: 1px solid var(--glass-border); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle-fab:hover {
            transform: scale(1.1);
            background: var(--white);
            border-color: var(--primary-color);
        }

        [data-theme="dark"] .theme-toggle-fab:hover {
            background: rgba(30, 41, 59, 1);
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 32px;
                margin-bottom: 25px;
                margin-top: 30px;
            }
            body {
                padding: 15px;
                justify-content: flex-start;
                padding-top: 30px;
            }
            .home-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                padding-bottom: 30px;
            }
            .home-card {
                padding: 25px 10px;
                border-radius: 20px;
            }
            .home-card span {
                font-size: 15px;
                margin-top: 15px;
            }
            .theme-toggle-fab {
                top: 20px;
                right: 20px;
                width: 40px;
                height: 40px;
            }
            .theme-toggle-fab i {
                font-size: 20px !important;
            }
            .icon-container {
                width: 65px;
                height: 65px;
                border-radius: 18px;
            }
            .home-card i {
                font-size: 32px;
            }
        }
    </style>
</head>
<body class="preload">
    
    <!-- Floating Dark Mode Toggle -->
    <div class="theme-toggle-fab" onclick="toggleTheme()">
        <i class='bx bx-moon' style="font-size: 24px; color: var(--text-dark);" id="theme-toggle-icon"></i>
    </div>

    <h1 class="hero-title" id="index-business-name">PlayArea Manager</h1>

    <div class="home-grid">
        <a href="dashboard.html" class="home-card card-dashboard">
            <div class="icon-container">
                <i class='bx bx-grid-alt'></i>
            </div>
            <span>Dashboard</span>
        </a>
        <a href="customers.html" class="home-card card-customers">
            <div class="icon-container">
                <i class='bx bx-user'></i>
            </div>
            <span>Customers</span>
        </a>
        <a href="recharge.html" class="home-card card-recharge">
            <div class="icon-container">
                <i class='bx bx-wallet'></i>
            </div>
            <span>Recharge</span>
        </a>
        <a href="scan.html" class="home-card card-scan">
            <div class="icon-container">
                <i class='bx bx-qr-scan'></i>
            </div>
            <span>Check-in</span>
        </a>
        <a href="analytics.html" class="home-card card-analytics">
            <div class="icon-container">
                <i class='bx bx-bar-chart-alt-2'></i>
            </div>
            <span>Analytics</span>
        </a>
        <a href="settings.html" class="home-card card-settings">
            <div class="icon-container">
                <i class='bx bx-cog'></i>
            </div>
            <span>Settings</span>
        </a>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
