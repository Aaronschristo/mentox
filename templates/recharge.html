{% extends "layout.html" %}

{% block title %}Recharge Balance{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
        <i class='bx bx-wallet' style="font-size: 48px; color: var(--success);"></i>
    </div>
    <h2 style="text-align: center; margin-bottom: 10px;">Top Up Balance</h2>

    <div style="text-align:center; margin-bottom: 20px;">
        <button id="start-scanner-btn" class="btn" style="background: var(--primary-color); color: white;"
            onclick="startRechargeScanner()">
            <i class='bx bx-qr-scan'></i> Scan Customer QR
        </button>
    </div>
    <div id="recharge-reader" style="width: 100%; max-width: 400px; margin: 0 auto; display: none;"></div>

    <form id="recharge-form" onsubmit="handleRecharge(event)" style="margin-top: 20px;">
        <div class="form-group" style="position: relative;">
            <label>Customer Name</label>
            <input type="text" id="recharge-customer-name" class="form-input" placeholder="Type name to search..."
                autocomplete="off">
            <div id="customer-autocomplete-list"
                style="position: absolute; width: 100%; max-height: 200px; overflow-y: auto; background: var(--white); border: 1px solid var(--glass-border); border-radius: 8px; z-index: 1000; box-shadow: var(--box-shadow); display: none;">
            </div>
        </div>

        <div class="form-group">
            <label>Customer ID</label>
            <input type="text" id="recharge-customer-id" class="form-input" placeholder="Enter or Scan Customer ID"
                required readonly>
            <small style="color: var(--text-light); margin-top: 5px; display: block;">You can also scan the customer's
                QR code to auto-fill this.</small>
        </div>

        <div class="form-group">
            <label>Amount (₹)</label>
            <div style="position: relative;">
                <span
                    style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-weight: 600;">₹</span>
                <input type="number" id="recharge-amount" class="form-input" min="1" step="0.01"
                    style="padding-left: 30px;" required placeholder="0.00">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px;">
            <button type="button" class="btn" style="background: #e0e7ff; color: var(--primary-color);"
                onclick="document.getElementById('recharge-amount').value='100'">₹100</button>
            <button type="button" class="btn" style="background: #e0e7ff; color: var(--primary-color);"
                onclick="document.getElementById('recharge-amount').value='500'">₹500</button>
            <button type="button" class="btn" style="background: #e0e7ff; color: var(--primary-color);"
                onclick="document.getElementById('recharge-amount').value='1000'">₹1000</button>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 18px; padding: 15px;">
            Confirm Recharge
        </button>
    </form>
</div>

<script src="static/js/html5-qrcode.js"></script>
<script>
    let rechargeScanner = null;
    function startRechargeScanner() {
        if (rechargeScanner) return;
        document.getElementById('recharge-reader').style.display = 'block';
        document.getElementById('start-scanner-btn').style.display = 'none';

        rechargeScanner = new Html5QrcodeScanner(
            "recharge-reader",
            { fps: 10, qrbox: { width: 250, height: 250 } },
            false);

        rechargeScanner.render((decodedText) => {
            document.getElementById('recharge-customer-id').value = decodedText;

            if (window.allCustomers) {
                const customer = window.allCustomers.find(c => c.id === decodedText);
                if (customer) {
                    document.getElementById('recharge-customer-name').value = customer.name;
                }
            }

            showToast("QR Scanned successfully!");
            // Stop scanner
            rechargeScanner.clear();
            document.getElementById('recharge-reader').style.display = 'none';
            document.getElementById('start-scanner-btn').style.display = 'inline-flex';
            rechargeScanner = null;
        }, (err) => { });
    }
</script>
<style>
    #recharge-reader {
        border: none !important;
        margin-bottom: 15px;
    }

    #recharge-reader__scan_region {
        background: black;
        border-radius: 8px;
    }

    #recharge-reader button {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
    }
</style>
{% endblock %}
