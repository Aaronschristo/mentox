{% extends "layout.html" %}

{% block title %}Business Statistics{% endblock %}

{% block content %}
<div class="analytics-header">
    <div class="toggle-container">
        <div class="toggle-bg"></div>
        <button class="toggle-btn active" id="btn-hourly" onclick="switchInterval('hourly')">Hourly</button>
        <button class="toggle-btn" id="btn-daily" onclick="switchInterval('daily')">Daily</button>
    </div>
</div>

<div class="glass-card analytics-card">
    <div class="chart-header">
        <h2 class="chart-title">Number of Check-ins</h2>

        <div class="date-controls">
            <i class='bx bx-chevron-left date-nav-btn' onclick="shiftDate(-1)"></i>
            <span id="date-display">Loading...</span>
            <i class='bx bx-chevron-right date-nav-btn' onclick="shiftDate(1)"></i>
        </div>

        <div class="picker-container">
            <button id="aesthetic-date-picker" class="btn date-picker-btn">
                <i class='bx bx-calendar'></i> Pick Date
            </button>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="analyticsChart"></canvas>
    </div>
</div>

<style>
    /* Structural Layout Variables */
    .analytics-header {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 20px;
    }
    .analytics-card {
        padding: 30px;
    }
    .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
        flex-wrap: wrap;
        gap: 15px;
    }
    .chart-title {
        margin: 0;
        font-size: 20px;
        color: var(--text-dark);
    }
    .date-controls {
        display: flex;
        align-items: center;
        gap: 15px;
    }
    #date-display {
        font-weight: 500;
        color: var(--text-light);
        min-width: 180px;
        text-align: center;
    }
    .picker-container {
        position: relative;
    }
    .chart-container {
        position: relative;
        height: 400px;
        width: 100%;
    }

    /* Mobile Responsive Rendering */
    @media (max-width: 768px) {
        .analytics-header {
            justify-content: center;
            margin-bottom: 15px;
        }
        .analytics-card {
            padding: 20px 15px;
        }
        .chart-header {
            flex-direction: column;
            align-items: stretch;
            margin-bottom: 25px;
            gap: 18px;
        }
        .chart-title {
            text-align: center;
        }
        .date-controls {
            width: 100%;
            justify-content: space-between;
            background: rgba(99, 102, 241, 0.05);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px dashed rgba(99, 102, 241, 0.2);
        }
        [data-theme="dark"] .date-controls {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        #date-display {
            min-width: unset;
            font-size: 14px;
        }
        .picker-container {
            width: 100%;
        }
        .date-picker-btn {
            width: 100%; 
            justify-content: center;
        }
        .chart-container {
            height: 300px;
        }
    }
    .toggle-container {
        position: relative;
        display: inline-flex;
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 4px;
        box-shadow: var(--box-shadow);
    }

    [data-theme="dark"] .toggle-container {
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
    }

    .toggle-bg {
        position: absolute;
        top: 4px;
        bottom: 4px;
        left: 4px;
        width: calc(50% - 4px);
        background: var(--primary-color);
        border-radius: 8px;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 8px rgba(99, 102, 241, 0.3);
    }

    [data-theme="dark"] .toggle-bg {
        background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
        box-shadow: 0 4px 10px rgba(129, 140, 248, 0.4);
    }

    .toggle-container.daily .toggle-bg {
        transform: translateX(100%);
    }

    .toggle-btn {
        position: relative;
        z-index: 1;
        padding: 10px 30px;
        border: none;
        background: none;
        font-family: 'Poppins', sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        color: var(--text-light);
        transition: color 0.3s ease;
    }

    .toggle-btn.active {
        color: white;
    }

    [data-theme="dark"] .toggle-btn.active {
        color: white;
    }

    .date-nav-btn {
        font-size: 20px;
        color: var(--text-light);
        cursor: pointer;
        transition: color 0.2s;
    }

    .date-nav-btn:hover {
        color: var(--primary-color);
    }

    .date-picker-btn {
        background: transparent;
        border: 2px solid var(--primary-color);
        color: var(--primary-color);
        font-weight: 700;
        font-size: 16px;
        padding: 8px 24px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
    }

    .date-picker-btn i {
        font-size: 22px;
    }

    .date-picker-btn:hover {
        background: rgba(99, 102, 241, 0.1);
    }

    /* Keep it slightly muted but retaining the solid bounds for dark mode context */
    [data-theme="dark"] .date-picker-btn {
        background: rgba(15, 23, 42, 0.4);
        border-color: #818cf8;
        color: #818cf8;
    }
</style>

<link rel="preload" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"></noscript>
<style>

        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        border: 1px solid var(--glass-border) !important;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1) !important;
        border-radius: 16px !important;
        font-family: 'Poppins', sans-serif !important;
        color: var(--text-dark) !important;

    .flatpickr-calendar.arrowTop:before,
    .flatpickr-calendar.arrowTop:after,
    .flatpickr-calendar.arrowBottom:before,
    .flatpickr-calendar.arrowBottom:after {
        display: none !important;

    .flatpickr-current-month {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        padding-top: 5px !important;
        gap: 5px !important;
    }

    .flatpickr-current-month input.cur-year {
        color: var(--text-dark) !important;
        font-weight: 700 !important;
        background: rgba(99, 102, 241, 0.1) !important;

        border: none !important;
        appearance: none !important;
        -webkit-appearance: none !important;
        cursor: pointer !important;
        transition: background 0.2s ease !important;
        text-align: center !important;
    }

    .flatpickr-current-month .flatpickr-monthDropdown-months:hover {
        background: rgba(99, 102, 241, 0.2) !important;
    }

    .flatpickr-current-month .flatpickr-monthDropdown-months option {

        /* Dark mode bounds */
    }

    span.flatpickr-weekday {

        font-weight: 600 !important;
    }

    .flatpickr-day {
        color: var(--text-dark) !important;

    .flatpickr-day:hover,

        border-color: transparent !important;
        color: var(--primary-color) !important;
    }

    .flatpickr-day.selected,
    .flatpickr-day.selected:hover,
    .flatpickr-day.selected:focus {
        background: var(--primary-color) !important;
        border-color: var(--primary-color) !important;
        color: white !important;
    }

    .flatpickr-day.flatpickr-disabled,
    .flatpickr-day.prevMonthDay,
    .flatpickr-day.nextMonthDay {

        opacity: 0.5 !important;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/flatpickr" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
<script>
    let currentInterval = localStorage.getItem('analytics_interval') || 'hourly';
    let savedDate = localStorage.getItem('analytics_date');
    let currentDate = savedDate ? new Date(parseInt(savedDate)) : new Date();
    let analyticsChart = null;

    function initChart() {
        const ctx = document.getElementById('analyticsChart').getContext('2d');

        Chart.defaults.color = getComputedStyle(document.documentElement).getPropertyValue('--text-light').trim();
        Chart.defaults.font.family = "'Poppins', sans-serif";

        analyticsChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: 'Check-ins',
                    data: [],
                    backgroundColor: 'rgba(99, 102, 241, 0.2)', // var(--primary-color) with opacity
                    borderColor: 'rgba(99, 102, 241, 1)',
                    borderWidth: 1,
                    borderRadius: 4,
                    hoverBackgroundColor: 'rgba(99, 102, 241, 0.8)'
                }]
            },
            options: {
                animation: {
                    duration: 600
                },
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        titleFont: { size: 13, family: 'Poppins' },
                        bodyFont: { size: 14, family: 'Poppins', weight: 'bold' },
                        padding: 12,
                        cornerRadius: 8,
                        displayColors: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            precision: 0 // Integer numbers only
                        },
                        grid: {
                            color: function () {
                                return document.documentElement.getAttribute('data-theme') === 'dark' ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
                            },
                            drawBorder: false
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        }
                    }
                }
            }
        });
    }

    function formatDateForAPI(d) {
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function formatDisplayDate(dateStr, interval, endStr) {
        // Enforce localized Date parsing without UTC offset shifts taking place implicitly!
        const d = new Date(dateStr + 'T00:00:00');
        const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };

        if (interval === 'hourly') {
            return d.toLocaleDateString(undefined, options);
        } else {
            const e = new Date(endStr + 'T00:00:00');
            const startShort = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
            const endShort = e.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            return `${startShort} - ${endShort}`;
        }
    }

    function fetchAnalytics() {
        const apiDate = formatDateForAPI(currentDate);
        fetch(`/api/analytics?interval=${currentInterval}&date=${apiDate}`)
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    console.error(data.error);
                    return;
                }

                document.getElementById('date-display').innerText = formatDisplayDate(data.start, currentInterval, data.end);

                analyticsChart.data.labels = data.labels;
                analyticsChart.data.datasets[0].data = data.data;

                // Sync grid colors explicitly for dark mode transitions
                const gridColor = document.documentElement.getAttribute('data-theme') === 'dark' ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
                const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-light').trim();

                analyticsChart.options.scales.y.grid.color = gridColor;
                analyticsChart.options.scales.x.ticks.color = textColor;
                analyticsChart.options.scales.y.ticks.color = textColor;

                analyticsChart.update();
            });
    }

    function switchInterval(interval) {
        if (currentInterval === interval) return;

        currentInterval = interval;
        localStorage.setItem('analytics_interval', interval);

        const container = document.querySelector('.toggle-container');
        document.getElementById('btn-hourly').classList.remove('active');
        document.getElementById('btn-daily').classList.remove('active');

        if (interval === 'daily') {
            container.classList.add('daily');
            document.getElementById('btn-daily').classList.add('active');
        } else {
            container.classList.remove('daily');
            document.getElementById('btn-hourly').classList.add('active');
        }

        fetchAnalytics();
    }

    function shiftDate(direction) {
        if (currentInterval === 'hourly') {
            currentDate.setDate(currentDate.getDate() + direction);
        } else {
            currentDate.setDate(currentDate.getDate() + (direction * 7));
        }
        localStorage.setItem('analytics_date', currentDate.getTime());
        fetchAnalytics();
    }

    // Capture theme toggle clicks stringently mapped to the Chart to push native redraws.
    const originalToggleTheme = window.toggleTheme;
    window.toggleTheme = function () {
        originalToggleTheme();
        setTimeout(() => {
            if (analyticsChart) {
                const gridColor = document.documentElement.getAttribute('data-theme') === 'dark' ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
                const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-light').trim();
                analyticsChart.options.scales.y.grid.color = gridColor;
                analyticsChart.options.scales.x.ticks.color = textColor;
                analyticsChart.options.scales.y.ticks.color = textColor;
                analyticsChart.update();
            }
        }, 10);
    }

    document.addEventListener("DOMContentLoaded", () => {
        // Hydrate UI State
        if (currentInterval === 'daily') {
            const container = document.querySelector('.toggle-container');
            document.getElementById('btn-hourly').classList.remove('active');
            document.getElementById('btn-daily').classList.add('active');
            container.classList.add('daily');
        }

        initChart();
        fetchAnalytics();

        flatpickr("#aesthetic-date-picker", {
            disableMobile: "true", // Force custom UI bounding strictly over Safari/Chrome limits
            defaultDate: currentDate,
            onChange: function (selectedDates, dateStr, instance) {
                if (selectedDates.length > 0) {
                    currentDate = selectedDates[0];
                    localStorage.setItem('analytics_date', currentDate.getTime());
                    fetchAnalytics();
                }
            }
        });
    });
</script>
{% endblock %}
