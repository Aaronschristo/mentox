<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayArea Manager</title>
    <!-- Preconnect to CDN origins early to reduce DNS + TLS latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <!-- Google Fonts + Boxicons: async (non-render-blocking) loading -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </noscript>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1.4">
    <!-- Prevent FOUC: Apply dark mode immediately during parse -->
    <script>
        if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}?v=1.6" defer></script>
</head>
<body class="preload">
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo-details">
                <i class='bx bx-game'></i>
                <span class="logo_name">PlayArea</span>
            </div>
            <ul class="nav-links">
                <li>
                    <a href="/" class="{{ 'active' if request.path == '/' else '' }}">
                        <i class='bx bx-grid-alt'></i>
                        <span class="links_name">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="/customers" class="{{ 'active' if request.path == '/customers' else '' }}">
                        <i class='bx bx-user'></i>
                        <span class="links_name">Customers</span>
                    </a>
                </li>
                <li>
                    <a href="/recharge" class="{{ 'active' if request.path == '/recharge' else '' }}">
                        <i class='bx bx-wallet'></i>
                        <span class="links_name">Recharge</span>
                    </a>
                </li>
                <li>
                    <a href="/scan" class="{{ 'active' if request.path == '/scan' else '' }}">
                        <i class='bx bx-qr-scan'></i>
                        <span class="links_name">Check-in</span>
                    </a>
                </li>
                <li>
                    <a href="/analytics" class="{{ 'active' if request.path == '/analytics' else '' }}">
                        <i class='bx bx-bar-chart-alt-2'></i>
                        <span class="links_name">Analytics</span>
                    </a>
                </li>
            </ul>
        </nav>
        
        <!-- Prevent Sidebar FOUC -->
        <script>
            if (window.innerWidth > 768 && localStorage.getItem('desktop_sidebar_state') === 'closed') {
                document.querySelector('.sidebar').classList.add('active');
            }
        </script>

        <!-- Main Content -->
        <section class="main-content">
            <!-- Topbar -->
            <nav class="topbar">
                <div class="sidebar-button">
                    <i class='bx bx-menu sidebarBtn'></i>
                    <span class="dashboard-title">{% block title %}{% endblock %}</span>
                </div>
                <div style="display:flex; align-items:center;">
                    <i class='bx bx-moon' style="cursor: pointer; font-size: 24px; color: var(--text-dark);" onclick="toggleTheme()" id="theme-toggle-icon"></i>
                </div>
            </nav>

            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </section>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
