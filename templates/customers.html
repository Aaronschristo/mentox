{% extends "layout.html" %}

{% block title %}Customers & QR Codes{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
    <h2>Manage Customers</h2>
    <div>
        <button class="btn"
            style="background: var(--white); color: var(--primary-color); border: 1px solid var(--primary-color); margin-right: 10px;"
            onclick="startAssignQRFlow()">
            <i class='bx bx-qr-scan'></i> Assign Existing QR
        </button>
        <button class="btn btn-primary" onclick="toggleModal('issueQrModal')">
            <i class='bx bx-plus-circle'></i> Issue New QR
        </button>
    </div>
</div>

<div class="glass-card">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Balance</th>
                    <th>Registered On</th>
                    <th>QR Code</th>
                </tr>
            </thead>
            <tbody id="customers-table-body">
                <tr>
                    <td colspan="4" style="text-align: center;">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal for Issue QR -->
<div id="issueQrModal" class="modal"
    style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 100%; max-width: 500px; background: white; margin: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Issue QR Code</h2>
            <i class='bx bx-x' style="font-size: 24px; cursor: pointer;" onclick="toggleModal('issueQrModal')"></i>
        </div>
        <form id="issue-qr-form" onsubmit="handleIssueQR(event)">
            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="customer-name" class="form-input" required placeholder="Enter name">
            </div>
            <div class="form-group">
                <label>Initial Balance ($)</label>
                <input type="number" id="initial-balance" class="form-input" min="0" step="0.01" value="0" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create & Generate QR</button>
        </form>
    </div>
</div>

<!-- Modal to View Generated QR -->
<div id="viewQrModal" class="modal"
    style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 100%; max-width: 400px; background: white; margin: 20px; text-align: center;">
        <div style="display: flex; justify-content: flex-end;">
            <i class='bx bx-x' style="font-size: 24px; cursor: pointer;" onclick="toggleModal('viewQrModal')"></i>
        </div>
        <h2 id="qr-customer-name" style="margin-bottom: 10px;"></h2>
        <p style="color: var(--text-light); margin-bottom: 20px;">Customer ID: <span id="qr-customer-id"
                style="font-family: monospace; font-size: 12px;"></span></p>

        <div
            style="background: white; padding: 10px; border-radius: 12px; display: inline-block; box-shadow: var(--box-shadow);">
            <img id="qr-image" src="" alt="QR Code" style="width: 250px; height: 250px;">
        </div>

        <div style="margin-top: 25px;">
            <button class="btn btn-primary" onclick="downloadQR()">
                <i class='bx bx-download'></i> Download QR
            </button>
        </div>
    </div>
</div>

<!-- Modal for Assign Existing QR -->
<div id="assignQrModal" class="modal"
    style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 100%; max-width: 500px; background: white; margin: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Assign Existing QR</h2>
            <i class='bx bx-x' style="font-size: 24px; cursor: pointer;" onclick="closeAssignQRFlow()"></i>
        </div>

        <div id="assign-step-1">
            <p style="margin-bottom: 15px;">Scan the physical QR code first.</p>
            <div id="assign-reader" style="width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px;">
            </div>
        </div>

        <div id="assign-step-2" style="display: none;">
            <div
                style="background: var(--success); color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
                <i class='bx bx-check-circle'></i> QR Scanned Successfully!
            </div>
            <form id="assign-qr-form" onsubmit="handleAssignExistingQR(event)">
                <input type="hidden" id="assign-qr-id">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="assign-customer-name" class="form-input" required placeholder="Enter name">
                </div>
                <div class="form-group">
                    <label>Initial Balance (₹)</label>
                    <input type="number" id="assign-initial-balance" class="form-input" min="0" step="0.01" value="0"
                        required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Assign Customer to QR</button>
            </form>
        </div>
    </div>
</div>
<script src="static/js/html5-qrcode.js"></script>
<style>
    #assign-reader {
        border: none !important;
    }

    #assign-reader__scan_region {
        background: black;
        border-radius: 8px;
    }

    #assign-reader button {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
    }
</style>
{% endblock %}
