{% extends "layout.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="flex-header">
    <h2 style="margin: 0;">Application Settings</h2>
</div>

<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <form id="settings-form" onsubmit="handleSaveSettings(event)">
        <div class="form-group">
            <label for="business_name">Business Name</label>
            <input type="text" id="business_name" class="form-input" value="{{ settings.get('business_name', 'PlayArea Manager') if settings else 'PlayArea Manager' }}" required>
        </div>

        <div class="form-group">
            <label for="checkin_fee">Check-in Fee</label>
            <input type="number" id="checkin_fee" class="form-input" value="{{ settings.get('checkin_fee', '100.0') if settings else '100.0' }}" step="any" min="0" required>
        </div>

        <div class="form-group">
            <label for="currency_symbol">Currency Symbol</label>
            <input type="text" id="currency_symbol" class="form-input" value="{{ settings.get('currency_symbol', '₹') if settings else '₹' }}" required>
        </div>

        <div style="margin-top: 30px;">
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <i class='bx bx-save'></i> Save Settings
            </button>
        </div>
    </form>
</div>
{% endblock %}
