{% extends "layout.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="dashboard-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 30px;">
    <!-- Stats Cards -->
    <div class="glass-card stat-card" style="display: flex; align-items: center; justify-content: space-between;">
        <div>
            <h3 style="color: var(--text-light); font-size: 14px; text-transform: uppercase;">Total Customers</h3>
            <div id="total-customers" class="text-gradient" style="font-size: 36px; font-weight: 700; margin-top: 5px;">0</div>
        </div>
        <div style="background: rgba(99, 102, 241, 0.1); padding: 15px; border-radius: 12px; color: var(--primary-color);">
            <i class='bx bx-user' style="font-size: 32px;"></i>
        </div>
    </div>

    <div class="glass-card stat-card" style="display: flex; align-items: center; justify-content: space-between;">
        <div>
            <h3 style="color: var(--text-light); font-size: 14px; text-transform: uppercase;">Checkin Revenue</h3>
            <div class="text-gradient" style="font-size: 36px; font-weight: 700; margin-top: 5px;">₹<span id="total-revenue">0.00</span></div>
        </div>
        <div style="background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 12px; color: var(--success);">
            <i class='bx bx-wallet-alt' style="font-size: 32px;"></i>
        </div>
    </div>
</div>

<div class="glass-card">
    <div class="flex-header dashboard-header" style="margin-bottom: 20px;">
        <h2 style="margin: 0;">Recent Transactions</h2>
        <div class="header-buttons">
            <button onclick="loadDashboardStats()" class="btn btn-amount dashboard-refresh-btn">
                <i class='bx bx-refresh'></i> <span class="hide-on-mobile">Refresh</span>
            </button>
        </div>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Customer Name</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="transactions-table-body">
                <tr>
                    <td colspan="4" style="text-align: center; color: var(--text-light);">Loading...</td>
                </tr>
            </tbody>
        </table>
        <div id="loading-more-transactions" style="text-align: center; padding: 15px; color: var(--text-light); display: none;">
            <i class='bx bx-loader-alt bx-spin' style="font-size: 20px; vertical-align: middle;"></i> Loading older transactions...
        </div>
    </div>
</div>
{% endblock %}
